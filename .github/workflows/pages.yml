name: Build and Deploy Filma Docs

on:
  push:
    branches: [ master ]
    paths:
      - 'admin-manual/**'
      - 'api-spec/**'
      - 'template-jwt/**'
      - 'template-no-auth/**'
      - '*.md'
      - '_config.yml'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'admin-manual/**'
      - 'api-spec/**'
      - 'template-jwt/**'
      - 'template-no-auth/**'
      - '*.md'
      - '_config.yml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: filma-docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check docs source
        id: docs-source
        run: |
          set -euo pipefail
          if [ -f admin-manual/mkdocs.yml ] && [ -d admin-manual/docs ] && \
             [ -f api-spec/mkdocs.yml ] && [ -f api-spec/build.sh ] && [ -d api-spec/docs ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Docs source is not ready yet. Skipping MkDocs build."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.docs-source.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs Material
        if: steps.docs-source.outputs.exists == 'true'
        run: |
          pip install mkdocs-material

      - name: Build Admin Manual
        if: steps.docs-source.outputs.exists == 'true'
        run: |
          mkdocs build --strict -f admin-manual/mkdocs.yml

      - name: Generate split API specification docs
        if: steps.docs-source.outputs.exists == 'true'
        run: |
          bash api-spec/build.sh generate

      - name: Build API Specification Site
        if: steps.docs-source.outputs.exists == 'true'
        run: |
          mkdocs build --strict -f api-spec/mkdocs.generated.yml

      - name: Prepare publish directory
        run: |
          set -euo pipefail
          rm -rf publish
          mkdir -p publish

          if [ -f _config.yml ]; then
            cp -f _config.yml publish/_config.yml
          fi

          find . -maxdepth 1 -type f -name '*.md' \
            ! -name 'README.md' \
            ! -name 'api_specification.md' \
            -exec cp -f {} publish/ \;

          if [ -d template-jwt ]; then
            cp -a template-jwt publish/template-jwt
          fi
          if [ -d template-no-auth ]; then
            cp -a template-no-auth publish/template-no-auth
          fi

          if [ "${{ steps.docs-source.outputs.exists }}" = "true" ]; then
            mkdir -p publish/admin-manual publish/api-spec
            cp -a admin-manual/site/. publish/admin-manual/
            cp -a api-spec/site/. publish/api-spec/
          fi

          cat > publish/index.md <<'EOF'
          ---
          layout: default
          title: Filma Docs
          ---

          # Filma Docs

          公開ドキュメントとサンプルの一覧です。

          ## ドキュメント

          - [管理マニュアル](admin-manual/)
          - [API仕様書](api-spec/)

          ## サンプル

          - [JWT認証付きサンプル](template-jwt/)
          - [認証無しサンプル](template-no-auth/)

          ## その他のファイル
          EOF

          for file in publish/*.md; do
            name="$(basename "$file")"
            if [ "$name" = "index.md" ] || [ "$name" = "README.md" ] || [ "$name" = "api_specification.md" ]; then
              continue
            fi

            title="$(sed -n 's/^title:[[:space:]]*//p' "$file" | head -n 1)"
            if [ -z "$title" ]; then
              title="$(sed -n 's/^#[[:space:]]*//p' "$file" | head -n 1)"
            fi
            if [ -z "$title" ]; then
              title="$name"
            fi

            href="${name%.md}.html"
            printf -- '- [%s](%s)\n' "$title" "$href" >> publish/index.md
          done

      - name: Deploy docs to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          publish_branch: gh-pages
          keep_files: true
          enable_jekyll: true
