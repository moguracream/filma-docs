<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Filmaを使った動画配信ページの基本構成</title>
  <desc id="desc">独自フロント、Filma基盤、視聴者をつなぐBtoB向け構成図</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eef7f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#12313f" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#0f766e"/>
    </marker>
    <style>
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102a43; }
      .subtitle { font: 500 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #486581; }
      .card-title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102a43; }
      .card-sub { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f766e; }
      .item { font: 500 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334e68; }
      .small { font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #486581; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="url(#bg)"/>
  <text x="720" y="78" text-anchor="middle" class="title">独自フロント + Filma基盤で</text>
  <text x="720" y="124" text-anchor="middle" class="title">会員限定の動画配信ページを構築</text>
  <text x="720" y="166" text-anchor="middle" class="subtitle">事業導線は自由に設計し、動画管理・DRM・視聴権管理はFilmaへ</text>

  <g filter="url(#shadow)">
    <rect x="80" y="215" width="345" height="420" rx="24" fill="#ffffff"/>
    <rect x="548" y="190" width="345" height="470" rx="24" fill="#ffffff"/>
    <rect x="1015" y="215" width="345" height="420" rx="24" fill="#ffffff"/>
  </g>

  <g transform="translate(80 215)">
    <circle cx="70" cy="72" r="36" fill="#d9f4ef"/>
    <path d="M51 73h38M60 58h58v70H60zM74 94h30" fill="none" stroke="#0f766e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="172" y="68" text-anchor="middle" class="card-sub">自社・顧客側で設計</text>
    <text x="172" y="108" text-anchor="middle" class="card-title">独自フロント</text>
    <g transform="translate(50 170)">
      <text y="0" class="item">LP・サービスサイト</text>
      <text y="48" class="item">会員ページ</text>
      <text y="96" class="item">申込フォーム</text>
      <text y="144" class="item">決済・契約導線</text>
      <text y="192" class="item">ブランド体験</text>
    </g>
  </g>

  <g transform="translate(548 190)">
    <circle cx="72" cy="74" r="38" fill="#dbeafe"/>
    <path d="M52 77h42M64 55h84v42H64zM84 122h44M106 97v25" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="172" y="68" text-anchor="middle" class="card-sub">動画配信の土台</text>
    <text x="172" y="108" text-anchor="middle" class="card-title">Filma基盤</text>
    <g transform="translate(50 175)">
      <rect x="0" y="-28" width="245" height="42" rx="12" fill="#eff6ff"/>
      <text x="18" y="0" class="item">動画管理</text>
      <rect x="0" y="24" width="245" height="42" rx="12" fill="#ecfdf5"/>
      <text x="18" y="52" class="item">DRM</text>
      <rect x="0" y="76" width="245" height="42" rx="12" fill="#eff6ff"/>
      <text x="18" y="104" class="item">視聴プラン</text>
      <rect x="0" y="128" width="245" height="42" rx="12" fill="#ecfdf5"/>
      <text x="18" y="156" class="item">視聴権管理</text>
      <rect x="0" y="180" width="245" height="42" rx="12" fill="#eff6ff"/>
      <text x="18" y="208" class="item">API連携</text>
    </g>
  </g>

  <g transform="translate(1015 215)">
    <circle cx="70" cy="72" r="36" fill="#fef3c7"/>
    <path d="M70 52a18 18 0 1 0 0 36a18 18 0 0 0 0-36zM43 126c8-24 46-24 54 0M119 64l38 22l-38 22z" fill="none" stroke="#b45309" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="172" y="68" text-anchor="middle" class="card-sub">限定配信の利用者</text>
    <text x="172" y="108" text-anchor="middle" class="card-title">視聴者</text>
    <g transform="translate(50 170)">
      <text y="0" class="item">受講者</text>
      <text y="48" class="item">会員</text>
      <text y="96" class="item">購入者</text>
      <text y="144" class="item">ファン</text>
      <text y="192" class="item">法人契約ユーザー</text>
    </g>
  </g>

  <path d="M440 420 C485 420 500 420 535 420" stroke="#0f766e" stroke-width="9" fill="none" marker-end="url(#arrow)"/>
  <path d="M905 420 C950 420 965 420 1000 420" stroke="#0f766e" stroke-width="9" fill="none" marker-end="url(#arrow)"/>
  <text x="488" y="382" text-anchor="middle" class="small">API・埋め込み</text>
  <text x="952" y="382" text-anchor="middle" class="small">限定視聴</text>

  <rect x="235" y="700" width="970" height="66" rx="18" fill="#102a43"/>
  <text x="720" y="742" text-anchor="middle" style="font: 700 25px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #fff;">AIや自社開発でページを作り、配信基盤はFilmaに任せる</text>
</svg>
