<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Filmaの動画配信ワークフロー</title>
  <desc id="desc">動画アップロードから視聴までの5ステップ</desc>
  <defs>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f2537" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#0f766e"/>
    </marker>
    <style>
      .h1{font:700 38px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102a43}
      .lead{font:600 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#486581}
      .step{font:800 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f766e}
      .label{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102a43}
      .body{font:600 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#486581}
      .note{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1440" height="820" fill="#f8fbfc"/>
  <text x="720" y="78" text-anchor="middle" class="h1">動画アップロードから</text>
  <text x="720" y="124" text-anchor="middle" class="h1">限定視聴までを管理</text>
  <text x="720" y="166" text-anchor="middle" class="lead">管理画面とAPIで、動画・会員・視聴権をつなげる</text>
  <path d="M218 408 H1222" stroke="#0f766e" stroke-width="8" fill="none" marker-end="url(#arrow)" opacity="0.28"/>

  <g filter="url(#shadow)">
    <rect x="70" y="270" width="220" height="245" rx="22" fill="#ffffff"/>
    <rect x="330" y="270" width="220" height="245" rx="22" fill="#ffffff"/>
    <rect x="590" y="270" width="220" height="245" rx="22" fill="#ffffff"/>
    <rect x="850" y="270" width="220" height="245" rx="22" fill="#ffffff"/>
    <rect x="1110" y="270" width="220" height="245" rx="22" fill="#ffffff"/>
  </g>

  <g transform="translate(70 270)">
    <circle cx="110" cy="58" r="34" fill="#d9f4ef"/>
    <text x="110" y="126" text-anchor="middle" class="step">STEP 1</text>
    <text x="110" y="164" text-anchor="middle" class="label">動画アップロード</text>
    <text x="110" y="204" text-anchor="middle" class="body">管理画面から</text>
    <text x="110" y="232" text-anchor="middle" class="body">動画を登録</text>
  </g>
  <g transform="translate(330 270)">
    <circle cx="110" cy="58" r="34" fill="#dbeafe"/>
    <text x="110" y="126" text-anchor="middle" class="step">STEP 2</text>
    <text x="110" y="164" text-anchor="middle" class="label">視聴プラン</text>
    <text x="110" y="204" text-anchor="middle" class="body">複数動画を</text>
    <text x="110" y="232" text-anchor="middle" class="body">まとめて管理</text>
  </g>
  <g transform="translate(590 270)">
    <circle cx="110" cy="58" r="34" fill="#fef3c7"/>
    <text x="110" y="126" text-anchor="middle" class="step">STEP 3</text>
    <text x="110" y="164" text-anchor="middle" class="label">会員登録</text>
    <text x="110" y="204" text-anchor="middle" class="body">認証付きの</text>
    <text x="110" y="232" text-anchor="middle" class="body">ログイン導線</text>
  </g>
  <g transform="translate(850 270)">
    <circle cx="110" cy="58" r="34" fill="#ede9fe"/>
    <text x="110" y="126" text-anchor="middle" class="step">STEP 4</text>
    <text x="110" y="164" text-anchor="middle" class="label">視聴権付与</text>
    <text x="110" y="204" text-anchor="middle" class="body">会員ごとに</text>
    <text x="110" y="232" text-anchor="middle" class="body">閲覧範囲を制御</text>
  </g>
  <g transform="translate(1110 270)">
    <circle cx="110" cy="58" r="34" fill="#fee2e2"/>
    <text x="110" y="126" text-anchor="middle" class="step">STEP 5</text>
    <text x="110" y="164" text-anchor="middle" class="label">動画視聴</text>
    <text x="110" y="204" text-anchor="middle" class="body">許可された</text>
    <text x="110" y="232" text-anchor="middle" class="body">動画だけを表示</text>
  </g>

  <rect x="300" y="660" width="840" height="64" rx="18" fill="#102a43"/>
  <text x="720" y="702" text-anchor="middle" class="note">手動運用からAPI連携まで段階的に開始</text>
</svg>
