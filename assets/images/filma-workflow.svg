<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Filmaの動画配信ワークフロー</title>
  <desc id="desc">動画アップロードから視聴までの5ステップを示す図</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#0f766e"/>
    </marker>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#12313f" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102a43; }
      .subtitle { font: 500 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #486581; }
      .step { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f766e; }
      .label { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102a43; }
      .body { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #486581; }
    </style>
  </defs>
  <rect width="1440" height="820" fill="#f8fbfc"/>
  <text x="720" y="78" text-anchor="middle" class="title">動画アップロードから</text>
  <text x="720" y="124" text-anchor="middle" class="title">限定視聴までを管理</text>
  <text x="720" y="166" text-anchor="middle" class="subtitle">管理画面とAPIで、動画・会員・視聴権をつなげる</text>

  <path d="M215 400 H1225" stroke="#0f766e" stroke-width="8" fill="none" marker-end="url(#arrow)" opacity="0.35"/>

  <g filter="url(#shadow)">
    <rect x="70" y="255" width="230" height="270" rx="24" fill="#ffffff"/>
    <rect x="330" y="255" width="230" height="270" rx="24" fill="#ffffff"/>
    <rect x="590" y="255" width="230" height="270" rx="24" fill="#ffffff"/>
    <rect x="850" y="255" width="230" height="270" rx="24" fill="#ffffff"/>
    <rect x="1110" y="255" width="230" height="270" rx="24" fill="#ffffff"/>
  </g>

  <g transform="translate(70 255)">
    <circle cx="115" cy="68" r="38" fill="#d9f4ef"/>
    <path d="M115 92V48M96 67l19-19l19 19M88 94h54" fill="none" stroke="#0f766e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="115" y="140" text-anchor="middle" class="step">STEP 1</text>
    <text x="115" y="178" text-anchor="middle" class="label">動画アップロード</text>
    <text x="115" y="220" text-anchor="middle" class="body">管理画面から</text>
    <text x="115" y="248" text-anchor="middle" class="body">動画を登録</text>
  </g>

  <g transform="translate(330 255)">
    <circle cx="115" cy="68" r="38" fill="#dbeafe"/>
    <path d="M88 50h54v72H88zM102 70h26M102 90h26" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="115" y="140" text-anchor="middle" class="step">STEP 2</text>
    <text x="115" y="178" text-anchor="middle" class="label">視聴プラン作成</text>
    <text x="115" y="220" text-anchor="middle" class="body">複数動画を</text>
    <text x="115" y="248" text-anchor="middle" class="body">プラン化</text>
  </g>

  <g transform="translate(590 255)">
    <circle cx="115" cy="68" r="38" fill="#fef3c7"/>
    <path d="M115 48a19 19 0 1 0 0 38a19 19 0 0 0 0-38zM84 121c10-29 52-29 62 0" fill="none" stroke="#b45309" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="115" y="140" text-anchor="middle" class="step">STEP 3</text>
    <text x="115" y="178" text-anchor="middle" class="label">会員登録</text>
    <text x="115" y="220" text-anchor="middle" class="body">メール認証や</text>
    <text x="115" y="248" text-anchor="middle" class="body">ログイン導線</text>
  </g>

  <g transform="translate(850 255)">
    <circle cx="115" cy="68" r="38" fill="#ede9fe"/>
    <path d="M88 75h54M105 52h20v46h-20zM93 98h44v24H93z" fill="none" stroke="#6d28d9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="115" y="140" text-anchor="middle" class="step">STEP 4</text>
    <text x="115" y="178" text-anchor="middle" class="label">視聴権付与</text>
    <text x="115" y="220" text-anchor="middle" class="body">会員ごとに</text>
    <text x="115" y="248" text-anchor="middle" class="body">閲覧範囲を制御</text>
  </g>

  <g transform="translate(1110 255)">
    <circle cx="115" cy="68" r="38" fill="#fee2e2"/>
    <path d="M92 45h48v70H92zM111 66l25 14l-25 14z" fill="none" stroke="#dc2626" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="115" y="140" text-anchor="middle" class="step">STEP 5</text>
    <text x="115" y="178" text-anchor="middle" class="label">動画視聴</text>
    <text x="115" y="220" text-anchor="middle" class="body">許可された動画を</text>
    <text x="115" y="248" text-anchor="middle" class="body">限定配信</text>
  </g>

  <rect x="235" y="650" width="970" height="66" rx="18" fill="#102a43"/>
  <text x="720" y="692" text-anchor="middle" style="font: 700 25px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #fff;">手動運用からAPI連携まで、段階的に始められる</text>
</svg>
