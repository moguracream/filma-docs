<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Filma API連携構成図</title>
  <desc id="desc">外部システム、Filma API、Filma管理機能の連携図</desc>
  <defs>
    <filter id="shadow" x="-16%" y="-16%" width="132%" height="132%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f2537" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M2,2 L14,8 L2,14 Z" fill="#2563eb"/>
    </marker>
    <style>
      .h1{font:700 38px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102a43}
      .lead{font:600 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#486581}
      .group{font:700 27px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102a43}
      .label{font:700 21px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102a43}
      .api{font:800 36px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}
      .apiSub{font:700 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#d9f4ef}
      .note{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1440" height="820" fill="#f8fbfc"/>
  <text x="720" y="78" text-anchor="middle" class="h1">既存システムとFilma APIをつなげて</text>
  <text x="720" y="124" text-anchor="middle" class="h1">動画の視聴権を付与</text>
  <text x="720" y="166" text-anchor="middle" class="lead">EC、LMS、会員DB、CRM、業務システムから動画配信基盤へ連携</text>

  <g filter="url(#shadow)">
    <rect x="90" y="245" width="340" height="360" rx="22" fill="#ffffff"/>
    <rect x="550" y="270" width="340" height="310" rx="28" fill="#0f766e"/>
    <rect x="1010" y="245" width="340" height="360" rx="22" fill="#ffffff"/>
  </g>

  <text x="260" y="305" text-anchor="middle" class="group">外部システム</text>
  <g transform="translate(132 345)">
    <rect width="256" height="48" rx="14" fill="#eff6ff"/>
    <text x="128" y="31" text-anchor="middle" class="label">EC / 決済</text>
    <rect y="62" width="256" height="48" rx="14" fill="#ecfdf5"/>
    <text x="128" y="93" text-anchor="middle" class="label">LMS</text>
    <rect y="124" width="256" height="48" rx="14" fill="#eff6ff"/>
    <text x="128" y="155" text-anchor="middle" class="label">会員DB</text>
    <rect y="186" width="256" height="48" rx="14" fill="#ecfdf5"/>
    <text x="128" y="217" text-anchor="middle" class="label">CRM / 業務システム</text>
  </g>

  <g transform="translate(550 270)">
    <text x="170" y="140" text-anchor="middle" class="api">Filma API</text>
    <text x="170" y="184" text-anchor="middle" class="apiSub">視聴権を外部から制御</text>
  </g>

  <text x="1180" y="305" text-anchor="middle" class="group">Filmaで管理</text>
  <g transform="translate(1052 345)">
    <rect width="256" height="48" rx="14" fill="#eff6ff"/>
    <text x="128" y="31" text-anchor="middle" class="label">視聴権</text>
    <rect y="62" width="256" height="48" rx="14" fill="#ecfdf5"/>
    <text x="128" y="93" text-anchor="middle" class="label">視聴プラン</text>
    <rect y="124" width="256" height="48" rx="14" fill="#eff6ff"/>
    <text x="128" y="155" text-anchor="middle" class="label">動画管理</text>
    <rect y="186" width="256" height="48" rx="14" fill="#ecfdf5"/>
    <text x="128" y="217" text-anchor="middle" class="label">限定動画再生</text>
  </g>

  <path d="M455 425 H525" stroke="#2563eb" stroke-width="9" fill="none" marker-end="url(#arrow)"/>
  <path d="M915 425 H985" stroke="#2563eb" stroke-width="9" fill="none" marker-end="url(#arrow)"/>
  <text x="490" y="390" text-anchor="middle" class="lead">申込・購入</text>
  <text x="950" y="390" text-anchor="middle" class="lead">権限反映</text>

  <rect x="300" y="700" width="840" height="64" rx="18" fill="#102a43"/>
  <text x="720" y="742" text-anchor="middle" class="note">申込・決済・会員管理と視聴権をつなげる</text>
</svg>
