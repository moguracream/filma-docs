<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="820" viewBox="0 0 1440 820" role="img" aria-labelledby="title desc">
  <title id="title">Filmaのターゲット別ユースケース</title>
  <desc id="desc">制作会社、講座配信、IP配信の3用途</desc>
  <defs>
    <filter id="shadow" x="-16%" y="-16%" width="132%" height="132%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f2537" flood-opacity="0.12"/>
    </filter>
    <style>
      .h1{font:700 38px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102a43}
      .lead{font:600 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#486581}
      .kicker{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0f766e}
      .card{font:700 27px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102a43}
      .body{font:600 21px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#334e68}
      .note{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1440" height="820" fill="#f8fbfc"/>
  <text x="720" y="78" text-anchor="middle" class="h1">3つのBtoB用途に合わせて</text>
  <text x="720" y="124" text-anchor="middle" class="h1">動画配信ページを構築</text>
  <text x="720" y="166" text-anchor="middle" class="lead">制作案件、講座配信、IP配信の「限定視聴」をFilmaで支える</text>

  <g filter="url(#shadow)">
    <rect x="90" y="235" width="360" height="390" rx="22" fill="#ffffff"/>
    <rect x="540" y="235" width="360" height="390" rx="22" fill="#ffffff"/>
    <rect x="990" y="235" width="360" height="390" rx="22" fill="#ffffff"/>
  </g>

  <g transform="translate(90 235)">
    <rect x="30" y="30" width="300" height="84" rx="18" fill="#d9f4ef"/>
    <text x="180" y="62" text-anchor="middle" class="kicker">Web制作・開発会社</text>
    <text x="180" y="96" text-anchor="middle" class="card">制作案件に組み込む</text>
    <text x="54" y="166" class="body">会員制動画ページ</text>
    <text x="54" y="210" class="body">動画教材販売サイト</text>
    <text x="54" y="254" class="body">既存サービスへの追加</text>
    <rect x="54" y="302" width="252" height="56" rx="16" fill="#ecfdf5"/>
    <text x="180" y="338" text-anchor="middle" class="kicker">フロント制作に集中</text>
  </g>

  <g transform="translate(540 235)">
    <rect x="30" y="30" width="300" height="84" rx="18" fill="#dbeafe"/>
    <text x="180" y="62" text-anchor="middle" class="kicker">講座・セミナー配信</text>
    <text x="180" y="96" text-anchor="middle" class="card">受講者別に配信</text>
    <text x="54" y="166" class="body">有料講座</text>
    <text x="54" y="210" class="body">法人研修</text>
    <text x="54" y="254" class="body">セミナーアーカイブ</text>
    <rect x="54" y="302" width="252" height="56" rx="16" fill="#eff6ff"/>
    <text x="180" y="338" text-anchor="middle" class="kicker">視聴プランで管理</text>
  </g>

  <g transform="translate(990 235)">
    <rect x="30" y="30" width="300" height="84" rx="18" fill="#fef3c7"/>
    <text x="180" y="62" text-anchor="middle" class="kicker">IP・ファン向け配信</text>
    <text x="180" y="96" text-anchor="middle" class="card">自社ブランドで配信</text>
    <text x="54" y="166" class="body">限定特典映像</text>
    <text x="54" y="210" class="body">イベントアーカイブ</text>
    <text x="54" y="254" class="body">海外ファン向け配信</text>
    <rect x="54" y="302" width="252" height="56" rx="16" fill="#fffbeb"/>
    <text x="180" y="338" text-anchor="middle" class="kicker">DRM対応を訴求</text>
  </g>

  <rect x="260" y="700" width="920" height="64" rx="18" fill="#102a43"/>
  <text x="720" y="742" text-anchor="middle" class="note">共通ニーズは、限定配信と視聴権管理</text>
</svg>
